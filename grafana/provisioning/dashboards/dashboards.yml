# Tells Grafana to load any dashboard JSON found in /var/lib/grafana/dashboards
# (mounted from grafana/dashboards/) on startup. Drop a .json in there and it
# appears automatically — dashboards as code.
apiVersion: 1

providers:
  - name: Polaris
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
