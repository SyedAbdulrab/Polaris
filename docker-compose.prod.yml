# Production stack for Polaris on a single VM.
#
# Assumes polaris-web is cloned as a sibling of this repo:
#   ~/polaris/
#   ~/polaris-web/
#
# Then from inside ~/polaris:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# This file is intentionally minimal — postgres + redis + api + web on one host. No nginx,
# no TLS. The web is exposed on :3001 and the API on :3000; you'll hit them by EC2 public IP.

services:
  postgres:
    image: postgres:16-alpine
    container_name: polaris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - polaris-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Not exposed to the host on purpose — only the api/web containers can reach it.

  redis:
    image: redis:7-alpine
    container_name: polaris-redis
    restart: unless-stopped
    volumes:
      - polaris-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
    container_name: polaris-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 10
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 120
    ports:
      - "3000:3000"

  web:
    build:
      context: ../polaris-web
      args:
        # NEXT_PUBLIC_API_URL must be set at BUILD time, not runtime — Next.js inlines it
        # into the JS bundle. Change the IP / domain → rebuild the web image.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    container_name: polaris-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3001:3001"

volumes:
  polaris-db:
  polaris-redis:
