# Production stack for Polaris on a single VM.
#
# Assumes polaris-web is cloned as a sibling of this repo:
#   ~/polaris/
#   ~/polaris-web/
#
# Then from inside ~/polaris:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# This file is intentionally minimal — postgres + redis + api + web on one host. No nginx,
# no TLS. The web is exposed on :3001 and the API on :3000; you'll hit them by EC2 public IP.

services:
  postgres:
    image: postgres:16-alpine
    container_name: polaris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - polaris-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Not exposed to the host on purpose — only the api/web containers can reach it.

  redis:
    image: redis:7-alpine
    container_name: polaris-redis
    restart: unless-stopped
    volumes:
      - polaris-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # Prebuilt image from GHCR (built + pushed by polaris/.github/workflows/build.yml).
    # Override the tag for rollback, e.g. API_IMAGE_TAG=sha-4c57604 in .env.prod.
    image: ghcr.io/syedabdulrab/polaris-api:${API_IMAGE_TAG:-latest}
    container_name: polaris-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 10
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 120
      # Sentry error tracking. If SENTRY_DSN is unset, the SDK is a silent no-op.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    # No published ports — the API is reachable only via nginx on the internal
    # docker network (nginx → api:3000). Closed to the public internet.
    expose:
      - "3000"

  web:
    # Prebuilt image from GHCR (built + pushed by polaris-web/.github/workflows/build.yml).
    # NEXT_PUBLIC_API_URL is already baked into this image at CI build time.
    # Override the tag for rollback, e.g. WEB_IMAGE_TAG=sha-abc1234 in .env.prod.
    image: ghcr.io/syedabdulrab/polaris-web:${WEB_IMAGE_TAG:-latest}
    container_name: polaris-web
    restart: unless-stopped
    depends_on:
      - api
    # No published ports — reachable only via nginx (nginx → web:3001).
    expose:
      - "3001"

  # Reverse proxy / TLS terminator. Phase 4 = HTTP only on :80.
  # Phase 7 will add :443 + the SSL cert mount.
  nginx:
    image: nginx:1.27-alpine
    container_name: polaris-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Our virtual host configs. ":ro" = read-only, nginx can't accidentally write here.
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Shared volume for Let's Encrypt HTTP-01 challenge files.
      # certbot writes tokens here, nginx serves them.
      - certbot-webroot:/var/www/certbot:ro
      # Issued certificates. certbot writes them, nginx reads them in Phase 7.
      - letsencrypt:/etc/letsencrypt:ro

  # ACME client. Two modes:
  #   - Initial issuance: run as a one-off →
  #       docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm certbot <args>
  #   - Renewal: the long-running command below loops `certbot renew` every 12h.
  # On first `up` it will try to renew (no certs yet → no-op) then sleep.
  certbot:
    image: certbot/certbot:latest
    container_name: polaris-certbot
    restart: unless-stopped
    volumes:
      # Same two shared volumes as nginx, but read-WRITE here — certbot owns the writes.
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

  # ─────────────────────────── Observability stack ──────────────────────────
  # Prometheus scrapes /metrics from the API + the exporters below, stores the
  # time series, and Grafana visualizes them. All internal — only Grafana is
  # ever exposed publicly (via nginx, in a later phase).

  # Time-series DB + scraper.
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: polaris-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d" # keep 15 days of history
    expose:
      - "9090"

  # Host metrics: CPU, RAM, disk, network of the EC2 box itself.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: polaris-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"

  # Per-container metrics: CPU/mem/network of each docker container.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: polaris-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"

  # Dashboards. Datasource + dashboards are provisioned from ./grafana on boot.
  grafana:
    image: grafana/grafana:11.3.0
    container_name: polaris-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env.prod}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Public URL — used to build correct links. Set once the subdomain exists.
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.abdulrab.store}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"

volumes:
  polaris-db:
  polaris-redis:
  certbot-webroot:
  letsencrypt:
  prometheus-data:
  grafana-data:
