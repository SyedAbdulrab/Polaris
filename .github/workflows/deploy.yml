# Auto-deploy Polaris API to the EC2 box on every push to main.
#
# How it works:
#   1. GitHub spins up a runner.
#   2. Runner SSHes into the EC2 box using a deploy key stored in repo secrets.
#   3. Runner triggers ~/polaris/deploy/redeploy.sh, which does the real work
#      (git pull, docker build, up -d, healthcheck).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST     public IP or DNS of the VM, e.g. 13.51.55.183
#   EC2_USER     SSH user, usually `ubuntu`
#   EC2_SSH_KEY  full PEM of the private SSH key whose pubkey is in
#                ~/.ssh/authorized_keys on the VM (one specifically for deploys)
#
# Manual run: Actions tab → "Deploy Polaris API" → Run workflow.

name: Deploy Polaris API

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Don't run two deploys at once on the same target. The newer one wins.
concurrency:
  group: deploy-polaris
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # We don't actually need the source code on the runner — the VM does the
      # git pull itself. We just need an SSH key. So this job is dead simple.
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger redeploy on the VM
        run: |
          ssh -i ~/.ssh/deploy.pem \
              -o ServerAliveInterval=20 \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "/home/${{ secrets.EC2_USER }}/polaris/deploy/redeploy.sh"
