# Build the Polaris API image, push to GHCR, THEN deploy — in that order.
#
# The two jobs are ordered with `needs:` so the VM never pulls a stale image:
#   build  → builds + pushes ghcr.io/<owner>/polaris-api:{sha,latest}
#   deploy → (needs build) SSHes to the VM and runs redeploy.sh, which pulls
#            the freshly-pushed images and restarts the stack.
#
# Required repository secrets:
#   EC2_HOST, EC2_USER, EC2_SSH_KEY   (SSH into the VM for the deploy job)

name: Build & Deploy Polaris API

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: polaris-api-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/polaris-api
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build           # deploy only after the image is built + pushed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger redeploy on the VM
        run: |
          ssh -i ~/.ssh/deploy.pem \
              -o ServerAliveInterval=20 \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "/home/${{ secrets.EC2_USER }}/polaris/deploy/redeploy.sh"
