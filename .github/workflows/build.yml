# Build the Polaris API image in CI and push it to GHCR.
#
# This does NOT deploy anything — it just produces an immutable image artifact
# at ghcr.io/<owner>/polaris-api tagged with both the commit SHA and `latest`.
# The existing deploy.yml keeps working until we switch the VM to pull (R5).
#
# Why build here instead of on the EC2: CI runners are beefy, the build is
# reproducible, and we get a stored, rollback-able artifact per commit.

name: Build & Push Polaris API

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# GITHUB_TOKEN needs write access to packages (GHCR) to push the image.
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to GHCR using the workflow's built-in token — no PAT needed
      # for pushing from within the repo's own Actions.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute image tags/labels. ${{ github.repository_owner }} is your user/org;
      # GHCR requires lowercase, which the metadata action handles.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/polaris-api
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Buildx enables layer caching via the GitHub Actions cache backend,
      # which makes repeat builds much faster.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
