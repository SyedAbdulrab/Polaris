# Polaris virtual hosts — HTTPS
#
# Per domain we run two server blocks:
#   :80  → serves ACME renewal challenges, redirects everything else to HTTPS
#   :443 → terminates TLS and reverse-proxies to the backend container
#
# Both domains share ONE multi-SAN cert, stored under the app.abdulrab.store
# lineage (certbot names a multi-domain cert after its first -d domain).

# ─────────────────────────── shared proxy header snippet ───────────────────
# (nginx has no real "include variables" but these are repeated verbatim below)

# ═══════════════════════════ app.abdulrab.store ════════════════════════════

# HTTP → redirect to HTTPS (and serve renewals)
server {
    listen 80;
    listen [::]:80;
    server_name app.abdulrab.store;

    # Renewals still arrive over plain HTTP on :80 — keep serving them.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: permanent bounce to HTTPS, preserving path + query.
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → reverse proxy to the Next.js frontend (web:3001)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.abdulrab.store;

    ssl_certificate     /etc/letsencrypt/live/app.abdulrab.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.abdulrab.store/privkey.pem;

    location / {
        proxy_pass http://web:3001;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ═══════════════════════════ api.abdulrab.store ════════════════════════════

# HTTP → redirect to HTTPS (and serve renewals)
server {
    listen 80;
    listen [::]:80;
    server_name api.abdulrab.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → reverse proxy to the NestJS API (api:3000)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.abdulrab.store;

    ssl_certificate     /etc/letsencrypt/live/app.abdulrab.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.abdulrab.store/privkey.pem;

    location / {
        proxy_pass http://api:3000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ═══════════════════════════ catch-all ═════════════════════════════════════
# Any Host header we don't recognise gets the connection slammed shut, on both
# protocols. The 443 default needs a cert to complete the handshake before it
# can 444, so we reuse ours.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/app.abdulrab.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.abdulrab.store/privkey.pem;

    return 444;
}
