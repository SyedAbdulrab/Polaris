# Polaris virtual hosts — HTTP only
# In Phase 7 we'll add HTTPS server blocks alongside these and turn the
# port-80 blocks into pure HTTP→HTTPS redirects.

# ─────────────────────────────────────────────────────────────────────────
# app.abdulrab.store  → Next.js frontend container (web:3001)
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.abdulrab.store;

    # Let's Encrypt HTTP-01 challenge files (used in Phase 6).
    # Certbot writes tokens into /var/www/certbot, nginx serves them from here.
    # Listed first so it's matched before the catch-all `location /`.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://web:3001;

        # HTTP/1.1 unlocks keep-alive, chunked encoding, and the upgrade dance.
        proxy_http_version 1.1;

        # Tell the backend who the actual client is and what they originally asked for.
        # Without these the app sees nginx's container IP and an internal Host header.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow WebSocket upgrades (Next.js sometimes uses them for server actions).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ─────────────────────────────────────────────────────────────────────────
# api.abdulrab.store  → NestJS API container (api:3000)
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.abdulrab.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://api:3000;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────────────────────────────────
# Catch-all: any request whose Host header isn't one of the two above.
# We just close the connection without responding, so probes/scanners get
# no info about what's behind us. (444 is an nginx-only status code.)
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}
