# Prometheus scrape configuration.
#
# Prometheus PULLS: every `scrape_interval` it fetches /metrics from each target
# below over the internal docker network (service names resolve via docker DNS).
# Nothing here is public — these names only exist inside the compose network.

global:
  scrape_interval: 15s # how often to scrape every target
  scrape_timeout: 10s
  external_labels:
    monitor: polaris

scrape_configs:
  # The NestJS API's own metrics (http_requests_total, durations, Node process).
  - job_name: polaris-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3000"]

  # Host-level metrics: CPU, RAM, disk, network of the EC2 box.
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Per-container metrics: CPU/mem/network of each docker container.
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Prometheus scraping itself (handy for meta-monitoring).
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
